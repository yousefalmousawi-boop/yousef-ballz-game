<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ballz Ultimate</title>

<style>
html,body{
    margin:0;
    overflow:hidden;
    background:#111;
    font-family:Arial;
    touch-action:none;
}

canvas{
    display:block;
    background:#111;
}

#ui{
    position:absolute;
    top:10px;
    width:100%;
    text-align:center;
    color:white;
    z-index:5;
    font-weight:bold;
}

#score{
    font-size:22px;
}

#high{
    font-size:16px;
    opacity:.8;
}

#menu,
#gameOver{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.9);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    z-index:10;
}

#gameOver{
    display:none;
}

h1{
    font-size:55px;
    margin:0;
}

button{
    margin-top:20px;
    padding:16px 40px;
    border:none;
    border-radius:14px;
    font-size:22px;
}
</style>
</head>

<body>

<div id="ui">
    <div id="score">Score: 0</div>
    <div id="high">High Score: 0</div>
</div>

<div id="menu">
    <h1>BALLZ</h1>
    <button onclick="startGame()">PLAY</button>
</div>

<div id="gameOver">
    <h1>Game Over</h1>
    <div id="final"></div>
    <button onclick="restartGame()">Restart</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

const BALL_RADIUS = 6;

let BALL_SPEED = 9;

let balls = [];
let blocks = [];
let pickups = [];

let score = 0;
let highScore = localStorage.getItem("ballzHigh") || 0;

let level = 1;
let ballCount = 15;

let shooting = false;
let aiming = false;

let shooterX = canvas.width / 2;
let aimAngle = -Math.PI / 4;

document.getElementById("high").innerText =
    "High Score: " + highScore;

function vibrate(ms){
    if(navigator.vibrate){
        navigator.vibrate(ms);
    }
}

function randomColor(){
    const colors = [
        "#ff595e","#ffca3a","#8ac926",
        "#1982c4","#6a4c93","#ff924c"
    ];
    return colors[Math.floor(Math.random()*colors.length)];
}

function createRow(){

    let cols = Math.floor(canvas.width / 65);

    for(let i=0;i<cols;i++){

        if(Math.random() < 0.75){

            blocks.push({
                x:i*65+10,
                y:80,
                w:55,
                h:55,
                hp:level,
                color:randomColor()
            });

        }else if(Math.random() < 0.25){

            pickups.push({
                x:i*65+37,
                y:107,
                r:8
            });
        }
    }
}

function moveRowsDown(){

    blocks.forEach(b=> b.y += 65);
    pickups.forEach(p=> p.y += 65);

    for(let b of blocks){

        if(b.y + b.h >= canvas.height - 80){

            gameOver();
        }
    }
}

function updateUI(){

    document.getElementById("score").innerText =
        "Score: " + score;

    document.getElementById("high").innerText =
        "High Score: " + highScore;
}

function startGame(){

    document.getElementById("menu").style.display = "none";

    score = 0;
    level = 1;
    ballCount = 15;

    BALL_SPEED = 9;

    balls = [];
    blocks = [];
    pickups = [];

    createRow();

    updateUI();
}

function restartGame(){

    document.getElementById("gameOver").style.display = "none";

    startGame();
}

function gameOver(){

    if(score > highScore){

        highScore = score;

        localStorage.setItem(
            "ballzHigh",
            highScore
        );
    }

    updateUI();

    document.getElementById("final").innerHTML =
        "Score: " + score;

    document.getElementById("gameOver").style.display = "flex";
}

function shoot(angle){

    if(shooting) return;

    shooting = true;

    for(let i=0;i<ballCount;i++){

        setTimeout(()=>{

            balls.push({
                x:shooterX,
                y:canvas.height - 30,
                vx:Math.cos(angle) * BALL_SPEED,
                vy:Math.sin(angle) * BALL_SPEED,
                returned:false
            });

        }, i * 40);

    }
}

function reflect(ball, block){

    let closestX = Math.max(
        block.x,
        Math.min(ball.x, block.x + block.w)
    );

    let closestY = Math.max(
        block.y,
        Math.min(ball.y, block.y + block.h)
    );

    let dx = ball.x - closestX;
    let dy = ball.y - closestY;

    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < BALL_RADIUS){

        let nx = dx / dist;
        let ny = dy / dist;

        let dot = ball.vx * nx + ball.vy * ny;

        ball.vx -= 2 * dot * nx;
        ball.vy -= 2 * dot * ny;

        block.hp--;

        vibrate(5);

        if(block.hp <= 0){

            score += 1;

            blocks.splice(
                blocks.indexOf(block),
                1
            );

            updateUI();
        }
    }
}

canvas.addEventListener("pointerdown", ()=>{
    if(shooting) return;
    aiming = true;
});

canvas.addEventListener("pointermove", e=>{

    if(!aiming || shooting) return;

    let dx = e.clientX - shooterX;
    let dy = e.clientY - (canvas.height - 30);

    aimAngle = Math.atan2(dy, dx);
});

canvas.addEventListener("pointerup", ()=>{

    if(!aiming || shooting) return;

    aiming = false;

    if(aimAngle > -0.1) return;

    shoot(aimAngle);
});

function update(){

    balls.forEach(ball=>{

        ball.x += ball.vx;
        ball.y += ball.vy;

        if(ball.x <= BALL_RADIUS){

            ball.x = BALL_RADIUS;
            ball.vx *= -1;
        }

        if(ball.x >= canvas.width - BALL_RADIUS){

            ball.x = canvas.width - BALL_RADIUS;
            ball.vx *= -1;
        }

        if(ball.y <= BALL_RADIUS){

            ball.y = BALL_RADIUS;
            ball.vy *= -1;
        }

        if(ball.y >= canvas.height - 30){

            ball.returned = true;
            ball.vx = 0;
            ball.vy = 0;
        }

        blocks.forEach(block=>{
            reflect(ball, block);
        });

        pickups.forEach(p=>{

            let dx = ball.x - p.x;
            let dy = ball.y - p.y;

            if(Math.sqrt(dx*dx + dy*dy)
                < BALL_RADIUS + p.r){

                ballCount++;

                pickups.splice(
                    pickups.indexOf(p),
                    1
                );

                vibrate(20);
            }
        });

    });

    if(
        shooting &&
        balls.length &&
        balls.every(b=>b.returned)
    ){

        shooting = false;

        shooterX = balls[0].x;

        balls = [];

        level++;

        score += 5;

        // faster over time
        BALL_SPEED += 0.15;

        // extra balls every 3 levels
        if(level % 3 === 0){
            ballCount += 2;
        }

        moveRowsDown();
        createRow();

        updateUI();
    }
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // aim line
    if(!shooting){

        ctx.strokeStyle =
            "rgba(255,255,255,.3)";

        ctx.beginPath();

        ctx.moveTo(
            shooterX,
            canvas.height - 30
        );

        ctx.lineTo(
            shooterX + Math.cos(aimAngle)*140,
            canvas.height - 30 +
            Math.sin(aimAngle)*140
        );

        ctx.stroke();
    }

    // blocks
    blocks.forEach(b=>{

        ctx.fillStyle = b.color;

        ctx.beginPath();

        ctx.roundRect(
            b.x,b.y,b.w,b.h,12
        );

        ctx.fill();

        ctx.fillStyle = "white";
        ctx.font = "20px Arial";
        ctx.textAlign = "center";

        ctx.fillText(
            b.hp,
            b.x + b.w/2,
            b.y + 34
        );
    });

    // pickups
    pickups.forEach(p=>{

        ctx.fillStyle = "#00e5ff";

        ctx.beginPath();
        ctx.arc(
            p.x,p.y,p.r,0,Math.PI*2
        );
        ctx.fill();
    });

    // balls
    balls.forEach(ball=>{

        ctx.fillStyle = "white";

        ctx.beginPath();

        ctx.arc(
            ball.x,
            ball.y,
            BALL_RADIUS,
            0,
            Math.PI*2
        );

        ctx.fill();
    });

    // shooter
    if(!shooting){

        ctx.beginPath();

        ctx.arc(
            shooterX,
            canvas.height - 30,
            BALL_RADIUS,
            0,
            Math.PI*2
        );

        ctx.fillStyle = "white";
        ctx.fill();
    }
}

function loop(){

    update();
    draw();

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>

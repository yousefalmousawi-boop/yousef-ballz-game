<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>One Ball Collect</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #111;
    font-family: Arial;
    touch-action: none;
}

canvas {
    display: block;
}

#ui {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 22px;
    font-weight: bold;
}

#menu {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
}

button {
    padding: 15px 40px;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    margin-top: 15px;
}
</style>
</head>

<body>

<div id="ui">
Score: <span id="score">0</span>
</div>

<div id="menu">
<h1>ONE BALL</h1>
<button onclick="startGame()">PLAY</button>
</div>

<canvas id="c"></canvas>

<script>

const c = document.getElementById("c");
const x = c.getContext("2d");

function resize(){
    c.width = innerWidth;
    c.height = innerHeight;
}
resize();
addEventListener("resize", resize);

/* ---------------- GAME DATA ---------------- */

let ball = null;
let score = 0;
let speed = 4;

/* ---------------- VIBRATION ---------------- */

function vibrate(p){
    if(navigator.vibrate) navigator.vibrate(p);
}

/* ---------------- START ---------------- */

function startGame(){
    document.getElementById("menu").style.display = "none";

    score = 0;
    speed = 4;

    spawnBall();
    updateUI();
}

/* ---------------- UI ---------------- */

function updateUI(){
    document.getElementById("score").innerText = score;
}

/* ---------------- SPAWN SINGLE BALL ---------------- */

function spawnBall(){

    ball = {
        x: Math.random() * (c.width - 40) + 20,
        y: Math.random() * (c.height - 40) + 20,
        vx: (Math.random() > 0.5 ? 1 : -1) * speed,
        vy: (Math.random() > 0.5 ? 1 : -1) * speed,
        r: 20
    };
}

/* ---------------- TOUCH ---------------- */

addEventListener("pointerdown", e=>{

    if(!ball) return;

    let dx = e.clientX - ball.x;
    let dy = e.clientY - ball.y;

    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < ball.r){

        // SCORE ONLY ONCE PER TOUCH
        score += 1;
        updateUI();

        // SPEED UP GAME
        speed += 0.2;

        vibrate([20,40,20]);

        spawnBall(); // replace old ball (still ONLY ONE exists)
    }
});

/* ---------------- UPDATE ---------------- */

function update(){

    if(!ball) return;

    ball.x += ball.vx;
    ball.y += ball.vy;

    // bounce walls
    if(ball.x < ball.r || ball.x > c.width - ball.r){
        ball.vx *= -1;
    }

    if(ball.y < ball.r || ball.y > c.height - ball.r){
        ball.vy *= -1;
    }
}

/* ---------------- DRAW ---------------- */

function draw(){

    x.clearRect(0,0,c.width,c.height);

    if(ball){

        x.beginPath();
        x.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
        x.fillStyle = "white";
        x.fill();

        // glow
        x.beginPath();
        x.arc(ball.x, ball.y, ball.r + 10, 0, Math.PI*2);
        x.strokeStyle = "rgba(255,255,255,0.2)";
        x.stroke();
    }
}

/* ---------------- LOOP ---------------- */

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
